services:
  - type: web
    runtime: node
    name: jettis-game
    plan: free
    region: oregon
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 24.14.1
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        sync: false
